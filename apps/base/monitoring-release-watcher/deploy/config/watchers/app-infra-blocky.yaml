watchers:
  - type: docker_registry
    repo: ghcr.io
    image: 0xerr0r/blocky
    tag: v0.29.0
    includes:
      - "v[0-9]+\\.[0-9]+"
    excludes:
      - v0\.[0-9]$
      - v0\.1[0-9]$
      - v0\.2[0-8]$
  - name: Blocky PostgreSQL
    type: docker_registry
    repo: registry-1.docker.io
    image: library/postgres
    tag: 15.17-alpine3.23
    includes:
      - ^[0-9]+\.[0-9]+-alpine[0-9]+\.[0-9]+
      # TODO upgrade major version
      - ^15\.
    excludes:
      - .*-alpine3\.1[0-9]
      - .*-alpine3\.2[0-2]
      - ^[0-9]\.
      - ^1[0-4]\.
      - ^15\.[0-9]\.
      - ^15\.1[0-4]\.
  - name: "Blocky Redis"
    type: docker_registry
    repo: registry-1.docker.io
    image: library/redis
    tag: 8.4.2-alpine3.22
    includes:
      - ^[0-9]+\.[0-9]+\.[0-9]+.*alpine[0-9]+\.[0-9][0-9]
    excludes:
      - .*alpine3\.1[0-9]
      - .*alpine3\.2[0-1]
      - ^[0-7]\.
      - ^8\.[0-3]\.
