watchers:
  - name: SABnzbd Baseimage
    type: docker_registry
    repo: registry-1.docker.io
    image: library/python
    tag: 3.14.6-slim-trixie
    includes:
      - ^[0-9]+\.[0-9]+\.[0-9]+-slim-trixie
    excludes:
      - ^2\.
      - ^3\.[0-9]\.
      - ^3\.1[0-3]\.
      - ^3\.14\.[0-5]-
  - name: SABnzbd
    type: github_release
    repo: sabnzbd/sabnzbd
    release: 5.0.4
    excludes:
      - .*(RC|Alpha|Beta).*
  - name: SABnzbd nzbToMedia
    type: github_release
    repo: clinton-hall/nzbToMedia
    release: 12.1.13
