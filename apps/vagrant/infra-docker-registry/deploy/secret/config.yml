version: 0.1
log:
    fields:
        service: docker-registry
storage:
    cache:
        blobdescriptor: inmemory
    filesystem:
        rootdirectory: /var/lib/registry
    delete:
        enabled: true
auth:
    htpasswd:
        realm: basic-realm
        path: /etc/docker/registry/htpasswd
health:
    storagedriver:
        enabled: true
        interval: 10s
        threshold: 3
http:
    addr: :5443
    secret: ENC[AES256_GCM,data:77Ec6MRtJBdAhLGJ2LFub9WsIy7ho1FLkb7AzppiBLM=,iv:CWSFbaJnsAhPgfEUfA+Bv3MOoHIj9NRnBFbeymUfx3U=,tag:n7AjgvseR6wUML3h0nPM9w==,type:str]
