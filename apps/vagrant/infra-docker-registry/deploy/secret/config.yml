        certificate: /certs/tls.crt
        key: /certs/tls.key
    headers:
        X-Content-Type-Options:
            - nosniff
    debug:
        addr: :5001
        prometheus:
            enabled: true
            path: /metrics
notifications:
    endpoints:
        - name: docker-registry-ui
          url: http://docker-registry-ui.infra-docker-registry-ui.svc.cluster.local:8000/event-receiver
